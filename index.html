<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="Self-guided audio tour for the museum">
  <title>Museum Audio Guide</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <!-- Landing Page -->
  <section id="page-landing" class="page active">
    <div class="landing-inner">
      <img src="assets/logo.png" alt="Museum Logo" class="logo" onerror="this.style.display='none'">
      <h1>Welcome to the Museum</h1>
      <p class="subtitle">Your self-guided audio tour</p>
      <form id="form-register" autocomplete="off">
        <input type="text" id="inp-name" placeholder="Your Name" required>
        <input type="tel" id="inp-phone" placeholder="Phone Number" required pattern="[0-9]{10,15}">
        <select id="sel-lang"></select>
        <button type="submit" id="btn-start">Start Tour</button>
        <p id="reg-error" class="error hidden"></p>
      </form>
    </div>
  </section>

  <!-- Item Explorer -->
  <section id="page-explorer" class="page">
    <header class="topbar">
      <h2>Explore Items</h2>
      <button id="btn-lang-toggle" class="lang-btn" aria-label="Switch language">EN</button>
    </header>
    <div class="search-wrap">
      <input type="search" id="inp-search" placeholder="Search by number or name…">
    </div>
    <div id="item-grid" class="grid"></div>
    <div id="grid-skeleton" class="grid skeleton-grid hidden">
      <!-- skeleton placeholders injected by JS -->
    </div>
    <div id="grid-error" class="error-block hidden">
      <p>Failed to load items</p>
      <button id="btn-retry">Retry</button>
    </div>
  </section>

  <!-- Item Detail -->
  <section id="page-detail" class="page">
    <header class="topbar">
      <button id="btn-back" aria-label="Go back">← Back</button>
      <button id="btn-lang-toggle-detail" class="lang-btn" aria-label="Switch language">EN</button>
    </header>
    <div id="detail-content">
      <h2 id="detail-title"></h2>
      <div id="detail-images" class="image-carousel"></div>
      <div id="detail-video" class="video-wrap hidden"></div>
      <p id="detail-desc"></p>
    </div>

    <!-- Audio Player -->
    <div id="audio-player" class="player">
      <div class="player-status" id="player-status"></div>
      <div class="player-controls">
        <button id="btn-play" class="play-btn" aria-label="Play" disabled>
          <span class="icon-play">▶</span>
          <span class="icon-pause hidden">⏸</span>
        </button>
        <div class="progress-wrap">
          <div class="buffer-bar" id="buffer-bar"></div>
          <div class="progress-bar" id="progress-bar"></div>
          <input type="range" id="seek-bar" min="0" max="100" value="0" step="0.1" aria-label="Seek">
        </div>
        <div class="time-display">
          <span id="time-current">0:00</span> / <span id="time-duration">0:00</span>
        </div>
      </div>
    </div>

    <!-- Detail skeleton -->
    <div id="detail-skeleton" class="skeleton-detail hidden">
      <div class="sk-title"></div>
      <div class="sk-image"></div>
      <div class="sk-text"></div>
      <div class="sk-text short"></div>
    </div>
  </section>

  <script src="js/api.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
